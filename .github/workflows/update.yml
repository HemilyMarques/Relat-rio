name: Atualizar relatório automaticamente

on:
  push:
    paths:
      - 'data/**/*.csv'
      - 'generate_report.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar script
        run: python generate_report.py --input data/relatorio.csv --periodo "Relatório Automático"

      - name: Commit do HTML gerado
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "Atualização automática do relatório" || echo "Sem mudanças"
          git push
